<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntax AI - 3D Sphere Sequential Intro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Arial', sans-serif;
    }

    .intro-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #FFFFFF;
      overflow: hidden;
    }

    #introCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .baseball-bat {
      position: absolute;
      width: 300px;
      height: 60px;
      background: linear-gradient(90deg, #8B4513, #D2691E, #8B4513);
      border-radius: 30px 5px 5px 30px;
      top: 50%;
      left: -350px;
      transform: translate(-50%, -50%) rotate(-45deg);
      box-shadow: 0 0 20px rgba(139, 69, 19, 0.8);
      z-index: 10;
      display: none;
    }

    .baseball-bat.active {
      display: block;
      animation: batSwing 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    @keyframes batSwing {
      0% {
        left: -350px;
        transform: translate(-50%, -50%) rotate(-45deg);
      }
      70% {
        left: 45%;
        transform: translate(-50%, -50%) rotate(45deg);
      }
      100% {
        left: 50%;
        transform: translate(-50%, -50%) rotate(60deg);
      }
    }

    .character-sphere {
      position: absolute;
      width: 220px;
      height: 220px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(
        ellipse at 35% 35%,
        rgba(255, 215, 0, 0.15),
        rgba(255, 185, 0, 0.08),
        rgba(218, 165, 32, 0.05)
      );
      box-shadow: 
        0 0 50px rgba(255, 215, 0, 0.25),
        inset -20px -20px 40px rgba(255, 215, 0, 0.08),
        inset 20px 20px 40px rgba(255, 255, 255, 0.3);
      z-index: 4;
      display: none;
    }

    .character-sphere.active {
      display: block;
    }

    .character-sphere.flying {
      animation: sphereFlight 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes sphereFlight {
      0% {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(1) rotate3d(1, 1, 0, 0deg);
      }
      30% {
        left: 60%;
        top: 30%;
        transform: translate(-50%, -50%) scale(0.8) rotate3d(1, 1, 0, 180deg);
      }
      60% {
        left: 48%;
        top: 20%;
        transform: translate(-50%, -50%) scale(0.4) rotate3d(1, 1, 0, 360deg);
      }
      100% {
        left: 53.5%;
        top: 46%;
        transform: translate(-50%, -50%) scale(0.1) rotate3d(1, 1, 0, 540deg);
        opacity: 0;
      }
    }

    .logo-reveal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 1;
    }

    .logo-reveal.active {
      animation: logoFadeIn 0.5s ease-in forwards;
    }

    .logo-reveal h1 {
      font-size: 120px;
      font-weight: bold;
      color: #333333;
      margin: 0;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .i-letter {
      position: relative;
      color: #FFD700;
      text-shadow: 
        0 0 20px rgba(255, 215, 0, 0.8),
        0 0 40px rgba(255, 215, 0, 0.6);
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .logo-final {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      animation: logoFinalPulse 1s ease-in-out;
    }

    .logo-final h1 {
      font-size: 120px;
      font-weight: bold;
      color: #333333;
      margin: 0;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .logo-final .i-letter {
      position: relative;
      color: #FFD700;
    }

    .i-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, #FFD700, #FFA500);
      border-radius: 50%;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 
        0 0 15px rgba(255, 215, 0, 1),
        0 0 30px rgba(255, 215, 0, 0.8);
      animation: dotBounce 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    @keyframes dotBounce {
      0% {
        top: -100px;
      }
      60% {
        top: -20px;
      }
      80% {
        top: -30px;
      }
      100% {
        top: -25px;
      }
    }

    @keyframes logoFinalPulse {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="intro-container">
    <canvas id="introCanvas"></canvas>
    <div class="baseball-bat" id="bat"></div>
    <div class="character-sphere" id="charSphere"></div>
    <div class="logo-reveal" id="logo">
      <h1>Syntax A<span class="i-letter">i</span></h1>
    </div>
    <div class="logo-final" id="logoFinal" style="display: none;">
      <h1>Syntax A<span class="i-letter">i<span class="i-dot"></span></span></h1>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('introCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const codeLines = [
      { text: 'function generateCode() {', color: '#0000FF' },
      { text: '  const syntaxAI = new Agent({', color: '#0000FF' },
      { text: '    model: "gemini-2.0-flash",', color: '#A31515' },
      { text: '    apiKey: process.env.API_KEY', color: '#795E26' },
      { text: '  });', color: '#000000' },
      { text: '  return syntaxAI.run(prompt);', color: '#AF00DB' },
      { text: '}', color: '#000000' },
      { text: '', color: '#000000' },
      { text: 'async function refactorCode(input) {', color: '#0000FF' },
      { text: '  try {', color: '#AF00DB' },
      { text: '    const response = await api.process(input);', color: '#000000' },
      { text: '    console.log("Code refactored");', color: '#A31515' },
      { text: '    return response.data;', color: '#AF00DB' },
      { text: '  } catch (error) {', color: '#AF00DB' },
      { text: '    console.error("Error:", error);', color: '#A31515' },
      { text: '  }', color: '#000000' },
      { text: '}', color: '#000000' },
      { text: '', color: '#000000' },
      { text: 'export default App;', color: '#0000FF' },
      { text: '// Powered by Syntax AI', color: '#008000' }
    ];

    const lineHeight = 30;
    const fontSize = 18;
    const startX = 50;
    const startY = 50;
    let currentLine = 0;
    let currentChar = 0;
    let startTime = Date.now();
    let animationStage = 'typing';
    const particles = [];
    const allChars = [];

    // Calculate 3D sphere positions using Fibonacci sphere
    function calculateSpherePositions(numParticles, radius, centerX, centerY) {
      const positions = [];
      const phi = Math.PI * (3 - Math.sqrt(5)); // Golden angle

      for (let i = 0; i < numParticles; i++) {
        const y = 1 - (i / (numParticles - 1)) * 2;
        const radiusAtY = Math.sqrt(1 - y * y);
        const theta = phi * i;

        const x = Math.cos(theta) * radiusAtY;
        const z = Math.sin(theta) * radiusAtY;

        // 3D to 2D projection with perspective
        const scale = 1 + z * 0.3;
        const screenX = centerX + x * radius * scale;
        const screenY = centerY + y * radius * scale;
        
        const depth = z;

        positions.push({
          x: screenX,
          y: screenY,
          z: depth,
          scale: scale,
          index: i
        });
      }

      return positions.sort((a, b) => a.z - b.z);
    }

    // Line-by-line typing
    function typeCode() {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = `${fontSize}px "Consolas", "Courier New", monospace`;

      for (let i = 0; i < currentLine; i++) {
        ctx.fillStyle = codeLines[i].color;
        ctx.fillText(codeLines[i].text, startX, startY + i * lineHeight);
      }

      if (currentLine < codeLines.length) {
        const line = codeLines[currentLine];
        const typedText = line.text.substring(0, currentChar);
        ctx.fillStyle = line.color;
        ctx.fillText(typedText, startX, startY + currentLine * lineHeight);

        if (Math.floor(Date.now() / 500) % 2 === 0) {
          const cursorX = startX + ctx.measureText(typedText).width;
          ctx.fillStyle = '#000000';
          ctx.fillRect(cursorX, startY + currentLine * lineHeight - fontSize, 2, fontSize);
        }

        for (let i = 0; i < currentChar; i++) {
          const char = line.text[i];
          const charX = startX + ctx.measureText(line.text.substring(0, i)).width;
          const charY = startY + currentLine * lineHeight;
          
          if (!allChars.find(c => c.x === charX && c.y === charY)) {
            allChars.push({
              char: char,
              x: charX,
              y: charY,
              color: line.color
            });
          }
        }

        const elapsed = Date.now() - startTime;
        const typingSpeed = 30;
        const expectedChar = Math.floor(elapsed / typingSpeed);
        
        if (expectedChar > currentChar) {
          currentChar++;
        }

        if (currentChar > line.text.length) {
          currentLine++;
          currentChar = 0;
        }
      } else {
        if (Date.now() - startTime > 2000 && particles.length === 0) {
          animationStage = 'pitchout';
          
          const sphereRadius = 100;
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const spherePositions = calculateSpherePositions(
            allChars.filter(c => c.char.trim()).length,
            sphereRadius,
            centerX,
            centerY
          );
          
          let posIndex = 0;
          allChars.forEach((charData, index) => {
            if (charData.char.trim() && posIndex < spherePositions.length) {
              const pos = spherePositions[posIndex];
              particles.push({
                char: charData.char,
                x: charData.x,
                y: charData.y,
                originalColor: charData.color,
                targetX: pos.x,
                targetY: pos.y,
                z: pos.z,
                scale: pos.scale,
                speed: 0.08 + Math.random() * 0.04,
                startDelay: index * 8, // 8ms delay between each character
                started: false,
                arrived: false
              });
              posIndex++;
            }
          });
        }
      }
    }

    // Form sphere one by one
    function formSphereOneByOne() {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const elapsed = Date.now() - startTime - 2000;
      let allArrived = true;

      const sortedParticles = [...particles].sort((a, b) => a.z - b.z);

      sortedParticles.forEach(p => {
        if (elapsed < p.startDelay) {
          ctx.fillStyle = p.originalColor;
          ctx.font = `${fontSize}px "Consolas", monospace`;
          ctx.fillText(p.char, p.x, p.y);
          allArrived = false;
          return;
        }

        if (!p.started) {
          p.started = true;
        }

        const dx = p.targetX - p.x;
        const dy = p.targetY - p.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 3) {
          allArrived = false;
          p.x += dx * p.speed;
          p.y += dy * p.speed;
        } else {
          p.x = p.targetX;
          p.y = p.targetY;
          p.arrived = true;
        }

        const progress = 1 - Math.min(distance / 500, 1);
        const r = 255;
        const g = Math.floor(215 * progress + 50 * (1 - progress));
        const b = Math.floor(0 * progress + 50 * (1 - progress));
        
        const depthOpacity = 0.5 + (p.z + 1) * 0.25;
        const depthScale = p.scale;
        const charSize = fontSize * depthScale;

        ctx.globalAlpha = depthOpacity;
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.font = `${charSize}px "Consolas", monospace`;
        ctx.fillText(p.char, p.x, p.y);
        ctx.globalAlpha = 1;
      });

      if (elapsed > 500) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        const gradient = ctx.createRadialGradient(
          centerX, centerY, 60,
          centerX, centerY, 140
        );
        gradient.addColorStop(0, 'rgba(255, 215, 0, 0)');
        gradient.addColorStop(0.6, 'rgba(255, 215, 0, 0.08)');
        gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
        
        ctx.globalCompositeOperation = 'destination-over';
        ctx.beginPath();
        ctx.arc(centerX, centerY, 140, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }

      if (allArrived && elapsed > 3000) {
        animationStage = 'bat';
      }
    }

    function animate() {
      const elapsed = Date.now() - startTime;

      if (animationStage === 'typing') {
        typeCode();
      } else if (animationStage === 'pitchout') {
        formSphereOneByOne();
      } else if (animationStage === 'bat' && elapsed > 5500) {
        document.getElementById('bat').classList.add('active');
        document.getElementById('charSphere').classList.add('active');
        animationStage = 'fly';
      } else if (animationStage === 'fly' && elapsed > 6000) {
        document.getElementById('bat').style.display = 'none';
        document.getElementById('charSphere').classList.add('flying');
        document.getElementById('logo').classList.add('active');
        animationStage = 'complete';
      } else if (elapsed > 7500) {
        canvas.style.display = 'none';
        document.getElementById('charSphere').style.display = 'none';
        document.getElementById('logo').style.display = 'none';
        document.getElementById('logoFinal').style.display = 'block';
        
        setTimeout(() => {
          alert('Intro Complete!');
        }, 2000);
        return;
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('load', () => {
      animate();
    });
  </script>
</body>
</html>
